name: inscien

# Production single-container stack: one image that serves BOTH the API and the prebuilt
# static UI from one process (port 8200). No separate frontend container, no Node at runtime,
# no dev server, no CORS (same origin). Contrast compose.yaml, which is the dev stack
# (hot-reload backend + Next dev server in two containers).
#
#   docker compose -f compose.prod.yaml up --build
#
# Like dev, the only external dependency is a native Ollama on the host. Durable state lives
# in ./data (SQLite DB, the OpenAlex citation cache, narration audio).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    working_dir: /workspace
    volumes:
      # Your local Zotero data dir (zotero.sqlite + storage/), read-only — read via a private
      # snapshot under ./data, so the live library is never touched.
      - ${ZOTERO_HOST_DIR:-./zotero}:/workspace/zotero:ro
      # Durable user data (SQLite DB, OpenAlex citation cache, narration audio).
      - ./data:/workspace/data
    ports:
      - "8200:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=inscien
      - ENV_NAME=production
      - DATABASE_URL=sqlite:////workspace/data/inscien.db
      - ZOTERO_DATA_DIR=/workspace/zotero
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - KOKORO_VOICE=${KOKORO_VOICE:-af_heart}
      # Optional OpenAI (or OpenAI-compatible) cloud provider — opt-in per Settings. The key is
      # read from the environment only, never stored in the DB. Leave unset to stay fully local.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      # The image bakes the static UI here; main.py serves it (same origin → no CORS needed).
      - FRONTEND_DIST=/workspace/frontend-dist
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
