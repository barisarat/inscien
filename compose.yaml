name: inscien

# Local-first single-user stack: just the API, the web UI, and the vector store.
# No MySQL / Redis / Celery — chat history lives in a file-based SQLite DB and
# ingestion runs on-demand over the user's Zotero library, not a scheduled worker.
# Narration (TTS) runs inside the backend on CPU (Kokoro), so there is no GPU service
# and no GPU required.
#
# `docker compose up` boots the whole stack with no env setup. The only thing you must
# run yourself is a native Ollama on the host (see README). Override OLLAMA_BASE_URL /
# KOKORO_VOICE via a local .env file if needed (see .env.example).
#
# Data model: all state lives in the host `./data/` folder, including the paper-vector store
# at ./data/paper-vectors.json (a single JSON file - no vector-store container or process).
# It is a rebuildable cache (re-index from Zotero).

services:
  backend:
    build:
      context: ./backend
    working_dir: /workspace
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/workspace
      # The user's local Zotero data dir (zotero.sqlite + storage/), read-only. Point
      # ZOTERO_HOST_DIR at your host Zotero folder (e.g. ~/Zotero). InScien reads it via a
      # private snapshot under ./data, so the live library is never touched.
      - ${ZOTERO_HOST_DIR:-./zotero}:/workspace/zotero:ro
      # Durable user data (SQLite DB, indexes, narration audio) on an explicit host
      # folder — survives `down`/`down -v` and is independent of the source mount above.
      - ./data:/workspace/data
    ports:
      - "8200:8000"
    # Lets the backend reach an Ollama running on the host (works on Linux too).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=inscien
      - ENV_NAME=development
      - CORS_ORIGINS=http://localhost:3200
      - DATABASE_URL=sqlite:////workspace/data/inscien.db
      # Persist the embedding model on the (host-owned, writable) data mount so it survives
      # restarts and is writable by the non-root runtime user. See backend/entrypoint.sh.
      - FASTEMBED_CACHE_PATH=/workspace/data/.fastembed
      - ZOTERO_DATA_DIR=/workspace/zotero
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - KOKORO_VOICE=${KOKORO_VOICE:-af_heart}
      # Optional OpenAI (or OpenAI-compatible) cloud provider — opt-in per Settings. In Docker the
      # key is supplied here via env; the desktop build stores it in-app (local SQLite). A stored
      # key wins; this env is the fallback. Leave unset to stay fully local.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
    # Liveness probe (curl ships in the backend image). /health is dependency-free, so the
    # container is "healthy" once the API is serving — the frontend waits on this below.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    working_dir: /workspace
    # Install deps into an isolated volume (NOT the bind mount) so node_modules never
    # clashes with the host OS, then run the dev server bound to all interfaces.
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
      # Keep the Next.js build cache off the host bind mount too — like node_modules, it's a
      # disposable, container-owned artifact, so this stops a root-owned .next/ from landing
      # in the user's ./frontend checkout.
      - frontend_next:/workspace/.next
    ports:
      - "3200:3000"
    # Wait for the backend to be serving (healthy) so the UI's first calls don't race a
    # not-yet-ready API.
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - APP_NAME=inscien
      - NEXT_PUBLIC_APP_NAME=InScien
      - NEXT_PUBLIC_API_URL=http://localhost:8200
      - API_BASE_URL=http://backend:8000
      - INTERNAL_API_BASE_URL=http://backend:8000

volumes:
  frontend_node_modules:
  frontend_next:
