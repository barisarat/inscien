name: release

# Build and publish the `inscien` wheel to PyPI on a `v*` tag (or manually).
#
# InScien ships as `uvx inscien` - a browser-served local app. The wheel is pure-Python and its
# native dependencies (onnxruntime, kokoro-onnx -> espeak via espeakng-loader, imageio-ffmpeg)
# publish their own per-OS wheels, so this single Linux build serves Windows, macOS, and Linux.
# The Tauri desktop installers are retired; src-tauri/ is experimental (see PACKAGING.md).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC) - no stored token
    steps:
      - uses: actions/checkout@v4

      - name: Guard - tag must match the package version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: backend
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$tag  pyproject=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $ver. Bump backend/pyproject.toml first."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "npm", cache-dependency-path: frontend/package-lock.json }

      # Build the static UI and vendor it into backend/webui so the wheel serves it (same as `make web`).
      - name: Build frontend (static export) + vendor into backend/webui
        run: |
          cd frontend
          npm ci
          npm run build
          rm -rf ../backend/webui
          cp -r out ../backend/webui

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel
        working-directory: backend
        run: uv build

      # Trusted publishing: uv detects the GitHub Actions OIDC token automatically (id-token: write
      # above). One-time setup: on pypi.org, add this repo as a trusted publisher for `inscien`.
      - name: Publish to PyPI
        working-directory: backend
        run: uv publish --trusted-publishing always
